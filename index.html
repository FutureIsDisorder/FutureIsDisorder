<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Future is Disorder" />
  <title>FUTURE IS DISORDER</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #000000;
      line-height: 1.5;
    }

    /* Header */
    .header {
      padding: 30px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eeeeee;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .header nav a {
      color: #000000;
      text-decoration: none;
      font-size: 14px;
      margin-left: 30px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .header nav a:hover {
      text-decoration: underline;
    }

    /* Main content */
    .main {
      padding: 40px;
    }

    .project-section {
      margin-bottom: 60px;
    }

    .project-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    .project-year {
      font-size: 14px;
      color: #666666;
      margin-left: 10px;
    }

    /* Gallery grid */
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .gallery img {
      width: 100%;
      height: auto;
      display: block;
      border: 1px solid #eeeeee;
    }

    /* Footer */
    .footer {
      padding: 30px 40px;
      border-top: 1px solid #eeeeee;
      font-size: 12px;
      color: #666666;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .header {
        padding: 20px;
      }
      .header h1 {
        font-size: 16px;
      }
      .header nav a {
        margin-left: 20px;
        font-size: 12px;
      }
      .main {
        padding: 20px;
      }
      .gallery {
        grid-template-columns: 1fr;
      }
      .footer {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>FUTURE IS DISORDER</h1>
    <nav>
      <a href="#">DISORDERS</a>
    </nav>
  </header>

  <main class="main">
    <!-- Project 1 -->
    <section class="project-section">
      <h2 class="project-title">
        52.2297° N, 21.0122° E <span class="project-year">2026</span>
      </h2>
      <div class="gallery">
        <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&h=400&fit=crop" alt="" />
        <img src="https://images.unsplash.com/photo-1501594907352-04cda38ebc29?w=600&h=400&fit=crop" alt="" />
        <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600&h=400&fit=crop" alt="" />
      </div>
    </section>

    <!-- Project 2 -->
    <section class="project-section">
      <h2 class="project-title">
        50.0647° N, 19.9450° E <span class="project-year">2025</span>
      </h2>
      <div class="gallery">
        <img src="https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=600&h=400&fit=crop" alt="" />
        <img src="https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=600&h=400&fit=crop" alt="" />
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600&h=400&fit=crop" alt="" />
      </div>
    </section>

    <!-- Project 3 -->
    <section class="project-section">
      <h2 class="project-title">
        54.3520° N, 18.6466° E <span class="project-year">2024</span>
      </h2>
      <div class="gallery">
        <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=600&h=400&fit=crop" alt="" />
        <img src="https://images.unsplash.com/photo-1506197603052-3cc9c3a201bd?w=600&h=400&fit=crop" alt="" />
        <img src="https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=600&h=400&fit=crop" alt="" />
      </div>
    </section>

    <!-- Project 4 -->
    <section class="project-section">
      <h2 class="project-title">
        49.8138° N, 24.0232° E <span class="project-year">2023</span>
      </h2>
      <div class="gallery">
        <img src="https://images.unsplash.com/photo-1494790108755-2616b612b786?w=600&h=400&fit=crop" alt="" />
        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600&h=400&fit=crop" alt="" />
        <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=600&h=400&fit=crop" alt="" />
      </div>
    </section>
  </main>

  <footer class="footer">
    55.9828° S, 67.2917° W
  </footer>
</body>
</html>
