<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Future is Disorder" />
  <title>FUTURE IS DISORDER</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #000000;
      line-height: 1.5;
    }

    /* Header */
    .header {
      padding: 30px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eeeeee;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .header nav a {
      color: #000000;
      text-decoration: none;
      font-size: 14px;
      margin-left: 30px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .header nav a:hover {
      text-decoration: underline;
    }

    /* Main content */
    .main {
      padding: 40px;
    }

    /* Footer */
    .footer {
      padding: 30px 40px;
      border-top: 1px solid #eeeeee;
      font-size: 12px;
      color: #666666;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header {
        padding: 20px;
      }
      .header h1 {
        font-size: 16px;
      }
      .header nav a {
        margin-left: 20px;
        font-size: 12px;
      }
      .main {
        padding: 20px;
      }
      .footer {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>FUTURE IS DISORDER</h1>
    <nav>
      <a href="#">DISORDERS</a>
    </nav>
  </header>

 <main class="main">
  <div style="text-align: center; margin-bottom: 20px;">
    52.2297° N, 21.0122° E <span style="margin-left: 10px; color: #666;">2026</span>
  </div>
  <div style="display: flex; justify-content: center;">
    <img
      src="19250008.jpg"
      alt="FUTURE IS DISORDER"
      style="max-width: 100%; height: auto; border: 1px solid #eee;"
    />
  </div>
</main>

  <footer class="footer">
    55.9828° S, 67.2917° W
  </footer>
</body>
</html>
